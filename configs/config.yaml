# X-Extract Configuration
# This is a reference config file. The actual config is stored at:
# - Local: ~/.config/x-extract-go/config.yaml
# - Docker: /app/config/config.yaml
#
# You can override settings by creating a config.yaml in your base_dir/config/ folder.

# Server settings
server:
  # Host address to bind the HTTP server
  host: localhost
  # Port for the HTTP server and web dashboard
  port: 9091

# Download settings
download:
  # Base directory for all downloads and data
  # Subdirectories are auto-created: completed/, incoming/, cookies/, logs/, config/
  # Local default: $HOME/Downloads/x-download
  # Docker default: /downloads
  # Leave empty to use the default
  base_dir: ""

  # Maximum retry attempts for failed downloads
  max_retries: 3

  # Delay between retry attempts
  retry_delay: 30s

  # Note: concurrent_limit is deprecated. Downloads use per-platform semaphores.
  concurrent_limit: 3

  # Automatically start download workers when server starts
  auto_start_workers: true

  # Auto-install external tools (yt-dlp, tdl) if not found in PATH
  # Set to false to require manual installation
  auto_install: true

  # Prefer managed binaries over system PATH
  # When true, always use binaries from ~/.config/x-extract-go/bin/ even if tools exist in PATH
  # This forces auto-download when auto_install is enabled
  prefer_managed_binaries: false

  # Version pinning for external tools
  # Use "latest" to always fetch the newest release, or pin a specific version
  ytdlp_version: "latest"     # e.g. "2026.02.21"
  tdl_version: "latest"       # e.g. "v0.20.1"
  gallerydl_version: "latest" # e.g. "v1.31.6"

  # Override managed binary directory (default: ~/.config/x-extract-go/bin/)
  # bin_dir: ""

# Queue settings
queue:
  # Path to SQLite database
  # Local default: ~/.config/x-extract-go/queue.db
  # Docker default: /app/config/queue.db
  # Leave empty to use the default
  database_path: ""

  # Interval to check for new downloads
  check_interval: 10s

  # Automatically exit when queue is empty for the specified time
  # Set to false to keep the server running for dashboard access
  auto_exit_on_empty: true

  # Time to wait before auto-exit when queue is empty
  empty_wait_time: 30s

# Telegram settings
telegram:
  # Profile name for Telegram session
  profile: default

  # Storage type: bolt or memory
  storage_type: bolt

  # Path to Telegram session storage
  # Leave empty to use default based on base_dir
  storage_path: ""

  # Use group for downloads
  use_group: true

  # Rewrite file extensions
  rewrite_ext: true

  # Extra parameters for tdl command
  extra_params: ""

  # Path to tdl binary
  tdl_binary: tdl

  # Use takeout mode for Telegram
  takeout: false

# Twitter/X settings
twitter:
  # Path to cookie file
  # Leave empty to use default based on base_dir
  cookie_file: ""

  # Path to yt-dlp binary
  ytdlp_binary: yt-dlp

  # Write metadata alongside downloads
  write_metadata: true

# Gallery-dl settings (catch-all downloader for 100+ sites)
gallerydl:
  # Path to gallery-dl binary
  gallerydl_binary: gallery-dl

  # Write metadata alongside downloads
  write_metadata: true

  # Path to cookie file (optional, for sites requiring authentication)
  # cookie_file: ""

  # Extra parameters for gallery-dl command
  # extra_params: ""

# Notification settings
notification:
  # Enable desktop notifications
  enabled: true

  # Play sound on notification
  sound: true

  # Notification method: osascript (macOS), notify-send (Linux), etc.
  method: osascript

# Logging settings
logging:
  # Log level: debug, info, warn, error
  level: info

  # Log format: json, console
  format: console

  # Output path options:
  # - stdout: Print to console
  # - stderr: Print to stderr
  # - auto: Topic-based logs in base_dir/logs/ (download, queue, error)
  # - /path/to/file: Custom file path
  output_path: stdout
